<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridView · CodingIndo Tools</title>

    <!-- Tailwind + Font Awesome + Bootstrap Icons + AOS + SweetAlert2 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "media",
        theme: {
          extend: {
            animation: {
              "fade-in": "fadeIn 0.5s ease-in-out",
              "slide-up": "slideUp 0.5s ease-out",
              "pulse-slow": "pulse 3s infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              slideUp: {
                "0%": { transform: "translateY(20px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      /* CSS Variables for theming */
      :root {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #334155;
        --text-muted: #64748b;
        --card-bg: rgba(255, 255, 255, 0.9);
        --card-border: rgba(226, 232, 240, 0.8);
        --card-hover-bg: #ffffff;
        --card-hover-border: #cbd5e1;
        --nav-bg: rgba(255, 255, 255, 0.85);
        --nav-border: rgba(203, 213, 225, 0.5);
        --tab-active: linear-gradient(135deg, #4f46e5, #6366f1);
        --tab-inactive: rgba(241, 245, 249, 0.8);
        --accent-primary: #4f46e5;
        --accent-secondary: #818cf8;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --pagination-bg: #ffffff;
        --pagination-border: #e2e8f0;
        --pagination-hover: #eef2ff;
        --sidebar-width: 280px;
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #0f172a;
          --bg-secondary: #1e293b;
          --text-primary: #f1f5f9;
          --text-secondary: #cbd5e1;
          --text-muted: #94a3b8;
          --card-bg: rgba(30, 41, 59, 0.9);
          --card-border: rgba(51, 65, 85, 0.8);
          --card-hover-bg: #1e293b;
          --card-hover-border: #475569;
          --nav-bg: rgba(15, 23, 42, 0.9);
          --nav-border: rgba(51, 65, 85, 0.8);
          --tab-inactive: rgba(30, 41, 59, 0.9);
          --pagination-bg: #1e293b;
          --pagination-border: #334155;
          --pagination-hover: #2d3a4f;
        }
      }

      /* Base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          135deg,
          var(--bg-primary),
          var(--bg-secondary)
        );
        color: var(--text-primary);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* Typography */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--text-primary);
        font-weight: 600;
        line-height: 1.2;
      }

      p {
        color: var(--text-secondary);
      }

      /* Navigation */
      .glass-nav {
        background: var(--nav-bg);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--nav-border);
        position: sticky;
        top: 0;
        z-index: 40;
      }

      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        color: var(--text-secondary);
        transition: all 0.2s ease;
        text-decoration: none;
        font-weight: 500;
      }

      .nav-link:hover {
        background: rgba(79, 70, 229, 0.1);
        color: var(--accent-primary);
      }

      .nav-link.active {
        background: var(--accent-primary);
        color: white;
      }

      /* Tabs */
      .tabs-container {
        display: flex;
        flex-wrap: nowrap;
        gap: 0.75rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
        scrollbar-width: thin;
        -webkit-overflow-scrolling: touch;
      }

      .tabs-container::-webkit-scrollbar {
        height: 4px;
      }

      .tabs-container::-webkit-scrollbar-track {
        background: var(--nav-border);
        border-radius: 4px;
      }

      .tabs-container::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 4px;
      }

      .tab-modern {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        font-size: 0.95rem;
        background: var(--tab-inactive);
        color: var(--text-secondary);
        border: 1px solid transparent;
        transition: all 0.2s ease;
        cursor: pointer;
        white-space: nowrap;
      }

      .tab-modern:hover {
        background: var(--card-hover-bg);
        border-color: var(--accent-primary);
        transform: translateY(-2px);
      }

      .tab-modern.active {
        background: var(--tab-active);
        color: white;
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
      }

      .tab-modern.active .category-badge-count {
        background: rgba(255, 255, 255, 0.25);
        color: white;
      }

      /* Cards Grid */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(1, 1fr);
        gap: 1.75rem;
        min-height: 350px;
      }

      @media (min-width: 640px) {
        .grid-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 1024px) {
        .grid-container {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (min-width: 1280px) {
        .grid-container {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      .grid-card {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border: 1px solid var(--card-border);
        border-radius: 1.5rem;
        padding: 1.5rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        height: 100%;
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.5s ease-out;
      }

      .grid-card:hover {
        transform: translateY(-8px) scale(1.02);
        background: var(--card-hover-bg);
        border-color: var(--accent-primary);
        box-shadow: 0 25px 30px -12px rgba(79, 70, 229, 0.35);
      }

      .grid-card.available {
        border-left: 4px solid var(--success);
      }

      .grid-card.coming-soon {
        border-left: 4px solid var(--warning);
      }

      /* Icon Container */
      .icon-container {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.1),
          rgba(129, 140, 248, 0.1)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .grid-card:hover .icon-container {
        transform: scale(1.1) rotate(5deg);
      }

      .icon-container img {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }

      .default-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
      }

      /* Badges dengan icon */
      .badge {
        position: absolute;
        top: -0.5rem;
        right: -0.5rem;
        padding: 0.35rem 1rem 0.35rem 0.8rem;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .badge i {
        font-size: 0.7rem;
      }

      .badge.populer {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
      }
      .badge.populer i {
        color: #ffd700;
      }

      .badge.new {
        background: linear-gradient(135deg, #0284c7, #38bdf8);
      }
      .badge.new i {
        color: #a5f3fc;
      }

      .badge.beta {
        background: linear-gradient(135deg, #059669, #10b981);
      }
      .badge.beta i {
        color: #d1fae5;
      }

      .badge.hot {
        background: linear-gradient(135deg, #dc2626, #f87171);
      }
      .badge.hot i {
        color: #fee2e2;
      }

      .badge.tools {
        background: linear-gradient(135deg, #7c3aed, #a78bfa);
      }
      .badge.tools i {
        color: #ede9fe;
      }

      /* Status Badge */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .status-badge.available {
        background: rgba(16, 185, 129, 0.15);
        color: var(--success);
      }

      .status-badge.coming-soon {
        background: rgba(245, 158, 11, 0.15);
        color: var(--warning);
      }

      /* Pagination */
      .pagination-btn {
        min-width: 40px;
        height: 40px;
        border-radius: 12px;
        background: var(--pagination-bg);
        border: 1px solid var(--pagination-border);
        color: var(--text-secondary);
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pagination-btn:hover:not(:disabled) {
        background: var(--pagination-hover);
        border-color: var(--accent-primary);
        color: var(--accent-primary);
        transform: scale(1.05);
      }

      .pagination-btn.active-page {
        background: var(--accent-primary);
        border-color: var(--accent-primary);
        color: white;
      }

      .pagination-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Loader */
      .loader-modern {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(79, 70, 229, 0.2);
        border-top: 4px solid var(--accent-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 2rem auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Floating Background */
      .floating-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        overflow: hidden;
        pointer-events: none;
      }

      .floating-bg div {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle at 30% 50%,
          rgba(79, 70, 229, 0.15),
          transparent 70%
        );
        border-radius: 50%;
        filter: blur(70px);
        animation: float 20s infinite alternate;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(50px, 50px) scale(1.2);
        }
      }

      .bg-1 {
        top: 5%;
        left: 5%;
      }
      .bg-2 {
        bottom: 0;
        right: 0;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.1),
          transparent 70%
        );
        width: 500px;
        height: 500px;
        animation-delay: -5s;
      }
      .bg-3 {
        top: 40%;
        left: 60%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.1),
          transparent 70%
        );
        width: 400px;
        height: 400px;
        animation-delay: -2s;
      }

      /* Sidebar Mobile */
      .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 45;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .sidebar-mobile {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        z-index: 50;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
        border-right: 1px solid var(--nav-border);
        padding: 1.5rem 1rem;
        overflow-y: auto;
      }

      .sidebar-mobile.open {
        left: 0;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding-bottom: 1.5rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--nav-border);
      }

      .logo-icon {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
      }

      /* Menu Toggle */
      .menu-toggle {
        background: transparent;
        border: none;
        font-size: 1.8rem;
        color: var(--accent-primary);
        cursor: pointer;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        transition: all 0.2s;
      }

      .menu-toggle:hover {
        background: rgba(79, 70, 229, 0.1);
      }

      @media (min-width: 768px) {
        .menu-toggle {
          display: none;
        }
        .desktop-menu {
          display: flex;
        }
      }

      /* Category Badge Count */
      .category-badge-count {
        background: rgba(79, 70, 229, 0.1);
        padding: 0.15rem 0.6rem;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--accent-primary);
        margin-left: 0.5rem;
      }

      .tab-modern .category-badge-count {
        background: rgba(255, 255, 255, 0.2);
        color: inherit;
      }

      /* SweetAlert Custom */
      .swal2-popup {
        border-radius: 2rem !important;
        padding: 2rem !important;
        background: var(--card-bg) !important;
        backdrop-filter: blur(16px) !important;
        border: 1px solid var(--card-border) !important;
      }

      .swal2-title {
        color: var(--text-primary) !important;
        font-size: 2rem !important;
        font-weight: 800 !important;
      }

      .swal2-html-container {
        color: var(--text-secondary) !important;
      }

      .swal2-confirm {
        background: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        ) !important;
        border-radius: 9999px !important;
        padding: 0.75rem 2rem !important;
        font-weight: 600 !important;
        border: none !important;
      }

      .swal2-cancel {
        background: var(--pagination-bg) !important;
        color: var(--text-secondary) !important;
        border: 1px solid var(--pagination-border) !important;
        border-radius: 9999px !important;
        padding: 0.75rem 2rem !important;
        font-weight: 600 !important;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <!-- Floating Background -->
    <div class="floating-bg">
      <div class="bg-1"></div>
      <div class="bg-2"></div>
      <div class="bg-3"></div>
    </div>

    <!-- Sidebar Mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-mobile" id="sidebarMobile">
      <div class="sidebar-header">
        <!-- Gambar Logo -->
        <img
          src="https://codingindo.vercel.app/src/assets/images/logo.png"
          alt="GridView Logo"
          class="w-10 h-10 rounded-2xl shadow-lg group-hover:scale-110 transition-transform object-cover"
          onerror="
            this.onerror = null;
            this.src =
              'https://via.placeholder.com/40x40/4f46e5/ffffff?text=GV';
          "
        />
        <div>
          <h3 class="font-bold text-lg">
            CodingIndo<span class="text-indigo-600 dark:text-indigo-400"
              >Tools</span
            >
          </h3>
          <p class="text-xs text-slate-500 dark:text-slate-400">v2.0 mobile</p>
        </div>
      </div>

      <nav class="flex flex-col gap-1">
        <a href="#" data-category="all" class="nav-link sidebar-nav-link">
          <i class="fa-regular fa-compass w-6"></i>
          <span>Semua Alat</span>
          <span class="category-badge-count" id="sidebarCountAll">0</span>
        </a>
        <a href="#" data-category="encoder" class="nav-link sidebar-nav-link">
          <i class="fa-solid fa-lock-open w-6"></i>
          <span>Encoder/Decoder</span>
          <span class="category-badge-count" id="sidebarCountEncoder">0</span>
        </a>
        <a href="#" data-category="image" class="nav-link sidebar-nav-link">
          <i class="fa-solid fa-camera w-6"></i>
          <span>Gambar</span>
          <span class="category-badge-count" id="sidebarCountImage">0</span>
        </a>
        <a href="#" data-category="other" class="nav-link sidebar-nav-link">
          <i class="fa-solid fa-layer-group w-6"></i>
          <span>Other</span>
          <span class="category-badge-count" id="sidebarCountOther">0</span>
        </a>
      </nav>

      <div class="mt-8 pt-4 border-t border-slate-200 dark:border-slate-700">
        <p class="text-xs text-slate-400 px-4">
          <i class="fa-regular fa-heart text-rose-400 mr-1"></i>
          GridView Tools
        </p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav px-4 py-3">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
            <i class="fa-solid fa-bars"></i>
          </button>

          <!-- Logo dengan Gambar dan Title GridView -->
          <a href="#" class="flex items-center gap-3 group">
            <!-- Gambar Logo -->
            <img
              src="https://codingindo.vercel.app/src/assets/images/logo.png"
              alt="GridView Logo"
              class="w-10 h-10 rounded-2xl shadow-lg group-hover:scale-110 transition-transform object-cover"
              onerror="
                this.onerror = null;
                this.src =
                  'https://via.placeholder.com/40x40/4f46e5/ffffff?text=GV';
              "
            />

            <!-- Title GridView -->
            <span class="font-bold text-2xl text-slate-800 dark:text-white">
              CodingIndo<span class="text-indigo-600 dark:text-indigo-400"
                >Tools</span
              >
            </span>
          </a>
        </div>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex items-center gap-1">
          <a href="#" data-category="encoder" class="nav-link desktop-nav-link">
            <i class="fa-solid fa-lock-open"></i>
            <span>Encoder/Decoder</span>
            <span class="category-badge-count" id="navCountEncoder">0</span>
          </a>
          <a href="#" data-category="image" class="nav-link desktop-nav-link">
            <i class="fa-solid fa-camera"></i>
            <span>Gambar</span>
            <span class="category-badge-count" id="navCountImage">0</span>
          </a>
          <a href="#" data-category="other" class="nav-link desktop-nav-link">
            <i class="fa-solid fa-layer-group"></i>
            <span>Other</span>
            <span class="category-badge-count" id="navCountOther">0</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-10">
      <!-- Header -->
      <div class="mb-10" data-aos="fade-right">
        <span
          class="text-indigo-600 dark:text-indigo-400 font-semibold text-sm tracking-wider uppercase"
        >
          🧰 grid view tools
        </span>
        <h1 class="text-4xl md:text-5xl font-extrabold mt-2">
          Total
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600"
            id="totalToolsSpan"
            >33</span
          >
          alat siap pakai
        </h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-xl mt-3 text-lg">
          Setiap tab menampilkan jumlah akurat sesuai koleksi.
        </p>
      </div>

      <!-- Tabs -->
      <div class="tabs-container mb-10" data-aos="fade-up">
        <button data-category="all" class="tab-modern active" id="tabAll">
          <i class="fa-regular fa-compass"></i>
          <span>Semua</span>
          <span class="category-badge-count" id="countAll">0</span>
        </button>
        <button data-category="encoder" class="tab-modern" id="tabEncoder">
          <i class="fa-solid fa-lock-open"></i>
          <span>Encoder/Decoder</span>
          <span class="category-badge-count" id="countEncoder">0</span>
        </button>
        <button data-category="image" class="tab-modern" id="tabImage">
          <i class="fa-solid fa-camera"></i>
          <span>Gambar</span>

        // ==================== COUNT ====================

        // Update all counters
        document.getElementById("totalToolsSpan").innerText = counts.all;
        document.getElementById("countAll").innerText = counts.all;

        document.getElementById("countImage").innerText = counts.image;

        document.getElementById("navCountEncoder").innerText = counts.encoder;
        document.getElementById("navCountImage").innerText = counts.image;

        document.getElementById("sidebarCountAll").innerText = counts.all;
        document.getElementById("sidebarCountEncoder").innerText =
          counts.encoder;
        document.getElementById("sidebarCountImage").innerText = counts.image;
        document.getElementById("sidebarCountOther").innerText = counts.other;

        // ==================== STATE ====================
        let currentCategory = "all";
        let currentPage = 1;
        const itemsPerPage = 8;

        // DOM Elements
        const gridEl = document.getElementById("toolsGrid");
        const loaderEl = document.getElementById("loader");
        const paginationEl = document.getElementById("paginationContainer");
        const tabButtons = document.querySelectorAll(".tab-modern");
        const desktopNavLinks = document.querySelectorAll(".desktop-nav-link");
        const sidebarNavLinks = document.querySelectorAll(".sidebar-nav-link");
        const sidebar = document.getElementById("sidebarMobile");
        const overlay = document.getElementById("sidebarOverlay");
        const menuToggle = document.getElementById("menuToggle");

        // ==================== SIDEBAR FUNCTIONS ====================
        function openSidebar() {
          sidebar.classList.add("open");
          overlay.classList.add("active");
          document.body.style.overflow = "hidden";
        }

        function closeSidebar() {
          sidebar.classList.remove("open");
          overlay.classList.remove("active");
          document.body.style.overflow = "";
        }

        menuToggle.addEventListener("click", (e) => {
          e.stopPropagation();
          openSidebar();
        });

        overlay.addEventListener("click", closeSidebar);

        // Close sidebar on link click
        sidebarNavLinks.forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            closeSidebar();
            const cat = link.getAttribute("data-category");
            setCategory(cat);
          });
        });

        // ==================== HELPER FUNCTIONS ====================
        function getFilteredData() {
          return currentCategory === "all"
            ? toolsData
            : toolsData.filter((t) => t.category === currentCategory);
        }

        function generateToolLink(item) {
          return `/tool/${item.id}-${item.title.toLowerCase().replace(/\s+/g, "-")}`;
        }

        // ==================== SWEETALERT DIALOG ====================
        function showToolDialog(item) {
          const iconHtml = item.image
            ? `<img src="${item.image}" alt="${item.title}" class="w-16 h-16 mx-auto mb-4 object-contain" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white text-2xl\\'><i class=\\'${item.icon}\\'></i></div>';">`
            : `<div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white text-2xl"><i class="${item.icon}"></i></div>`;

          const statusConfig =
            item.status === "available"
              ? {
                  icon: "success",
                  title: "✅ Fitur Tersedia!",
                  color: "#10b981",
                  bg: "rgba(16, 185, 129, 0.1)",
                }
              : {
                  icon: "warning",
                  title: "🚧 Coming Soon",
                  color: "#f59e0b",
                  bg: "rgba(245, 158, 11, 0.1)",
                };

          Swal.fire({
            title: statusConfig.title,
            html: `
            <div class="text-center">
              ${iconHtml}
              <h3 class="text-2xl font-bold mb-2">${item.title}</h3>
              <p class="mb-4">${item.desc}</p>
              <div class="p-4 rounded-2xl mb-4" style="background: ${statusConfig.bg}; color: ${statusConfig.color};">
                <i class="fa-regular ${item.status === "available" ? "fa-circle-check" : "fa-clock"} mr-2"></i>
                <span class="font-semibold">${item.status === "available" ? "Fitur ini sudah dapat digunakan!" : "Fitur sedang dalam pengembangan"}</span>
              </div>
            </div>
          `,
            icon: statusConfig.icon,
            showConfirmButton: true,
            showCancelButton: true,
            confirmButtonText:
              item.status === "available"
                ? "🚀 Buka Fitur"
                : "🔔 Ingatkan Saya",
            cancelButtonText: "Tutup",
            confirmButtonColor:
              item.status === "available" ? "#10b981" : "#f59e0b",
            cancelButtonColor: "#64748b",
            background: "var(--card-bg)",
            backdrop: `rgba(0,0,0,0.5)`,
          }).then((result) => {
            if (result.isConfirmed && item.status === "available") {
              window.location.href = generateToolLink(item);
            } else if (result.isConfirmed && item.status !== "available") {
              Swal.fire({
                title: "📧 Notifikasi Diaktifkan",
                text: "Kami akan mengirimkan pemberitahuan ketika fitur ini rilis!",
                icon: "success",
                confirmButtonColor: "#4f46e5",
                timer: 3000,
                background: "var(--card-bg)",
              });
            }
          });
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderGrid() {
          const filtered = getFilteredData();
          const start = (currentPage - 1) * itemsPerPage;
          const end = start + itemsPerPage;
          const paginated = filtered.slice(start, end);

          if (paginated.length === 0 && filtered.length > 0) {
            currentPage = 1;
            return renderGrid();
          }

          let html = "";
          paginated.forEach((item, idx) => {
            // Fungsi untuk mendapatkan icon berdasarkan tipe badge
            function getBadgeIcon(badgeType) {
              const icons = {
                populer: '<i class="fa-solid fa-crown"></i>',
                new: '<i class="fa-solid fa-star"></i>',
                beta: '<i class="fa-solid fa-flask"></i>',
                hot: '<i class="fa-solid fa-fire"></i>',
                tools: '<i class="fa-solid fa-screwdriver-wrench"></i>',
              };
              return icons[badgeType] || "";
            }

            const badgeClass = item.badge ? `badge ${item.badge}` : "";
            const badgeIcon = item.badge ? getBadgeIcon(item.badge) : "";
            const badgeHtml = item.badge
              ? `<span class="${badgeClass}">${badgeIcon} ${item.badge}</span>`
              : "";

            const statusBadge =
              item.status === "available"
                ? '<span class="status-badge available"><i class="fa-regular fa-circle-check"></i> Tersedia</span>'
                : '<span class="status-badge coming-soon"><i class="fa-regular fa-clock"></i> Coming Soon</span>';

            const iconHtml = item.image
              ? `<div class="icon-container"><img src="${item.image}" alt="${item.title}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'default-icon\\'><i class=\\'${item.icon}\\'></i></div>';"></div>`
              : `<div class="icon-container"><div class="default-icon"><i class="${item.icon}"></i></div></div>`;

            html += `
            <div class="grid-card ${item.status === "available" ? "available" : "coming-soon"}" data-tool-id="${item.id}" style="animation-delay: ${idx * 0.05}s">
              ${badgeHtml}
              <div class="flex items-start gap-4 mb-3">
                ${iconHtml}
                <div>
                  <h3 class="font-bold text-lg line-clamp-2">${item.title}</h3>
                </div>
              </div>
              <p class="text-sm text-slate-600 dark:text-slate-400 flex-1 line-clamp-3">${item.desc}</p>
              <div class="mt-4">
                ${statusBadge}
              </div>
              <div class="mt-4 flex items-center justify-between">
                <span class="text-xs font-medium text-indigo-500 dark:text-indigo-400">
                  <i class="fa-regular fa-clock mr-1"></i>baru
                </span>
                <span class="bg-indigo-50 dark:bg-indigo-900/30 hover:bg-indigo-100 dark:hover:bg-indigo-800/50 text-indigo-700 dark:text-indigo-400 text-sm px-4 py-2 rounded-xl font-medium transition-all inline-flex items-center gap-1 group">
                  ${item.status === "available" ? "buka" : "detail"}
                  <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                </span>
              </div>
            </div>
          `;
          });

          gridEl.innerHTML = html;

          // Add click handlers
          document.querySelectorAll(".grid-card").forEach((card) => {
            card.addEventListener("click", function () {
              const toolId = this.getAttribute("data-tool-id");
              const tool = toolsData.find((t) => t.id == toolId);
              if (tool) showToolDialog(tool);
            });
          });
        }

        function renderPagination() {
          const filtered = getFilteredData();
          const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;

          let html = "";

          // Prev button
          html += `<button class="pagination-btn" data-page="prev" ${currentPage === 1 ? "disabled" : ""}>
          <i class="fa-solid fa-chevron-left"></i>
        </button>`;

          // Page numbers
          let startPage = Math.max(1, currentPage - 2);
          let endPage = Math.min(totalPages, startPage + 4);
          if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

          for (let i = startPage; i <= endPage; i++) {
            html += `<button class="pagination-btn ${i === currentPage ? "active-page" : ""}" data-page="${i}">${i}</button>`;
          }

          // Next button
          html += `<button class="pagination-btn" data-page="next" ${currentPage === totalPages ? "disabled" : ""}>
          <i class="fa-solid fa-chevron-right"></i>
        </button>`;

          paginationEl.innerHTML = html;
        }

        function refreshUI() {
          loaderEl.classList.remove("hidden");
          gridEl.style.opacity = "0.5";
          paginationEl.style.opacity = "0.5";

          setTimeout(() => {
            renderGrid();
            renderPagination();
            loaderEl.classList.add("hidden");
            gridEl.style.opacity = "1";
            paginationEl.style.opacity = "1";
          }, 300);
        }

        // ==================== CATEGORY SETTER ====================
        function setCategory(cat) {
          if (currentCategory === cat) return;

          currentCategory = cat;
          currentPage = 1;

          // Update tabs
          tabButtons.forEach((btn) => {
            if (btn.getAttribute("data-category") === cat) {
              btn.classList.add("active");
            } else {
              btn.classList.remove("active");
            }
          });

          // Update desktop nav
          desktopNavLinks.forEach((link) => {
            if (link.getAttribute("data-category") === cat) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });

          // Update sidebar nav
          sidebarNavLinks.forEach((link) => {
            if (link.getAttribute("data-category") === cat) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });

          refreshUI();
        }

        // ==================== EVENT LISTENERS ====================
        tabButtons.forEach((btn) => {
          btn.addEventListener("click", () =>
            setCategory(btn.getAttribute("data-category")),
          );
        });

        desktopNavLinks.forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            setCategory(link.getAttribute("data-category"));
          });
        });

        paginationEl.addEventListener("click", (e) => {
          const btn = e.target.closest(".pagination-btn");
          if (!btn || btn.hasAttribute("disabled")) return;

          const page = btn.getAttribute("data-page");
          const filtered = getFilteredData();
          const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;

          if (page === "prev" && currentPage > 1) {
            currentPage--;
          } else if (page === "next" && currentPage < totalPages) {
            currentPage++;
          } else if (!isNaN(parseInt(page))) {
            currentPage = parseInt(page);
          } else {
            return;
          }

          refreshUI();
        });

        // Initialize
        setCategory("all");
      })();
    </script>
